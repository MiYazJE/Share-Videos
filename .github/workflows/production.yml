name: Share videos CI pipeline for PRODUCTION

on:
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Select the application to deploy
        required: true
        type: choice
        options:
          - frontend
          - backend

jobs:
  test_server:
    name: Test server
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --no-optional
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm run test

  test_frontend:
    name: Test frontend
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --no-optional
      - name: Lint
        run: npm run lint
      - name: Test Cypress E2E
        uses: cypress-io/github-action@v7
        with:
          working-directory: ./client
          browser: chrome
          build: npm run build
          start: npm start
          wait-on: "http://localhost:3000"
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_server:
    name: Deploy server
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'backend'
    environment: Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy to Railway
        run: |
          npm install --global @railway/cli
          railway up --ci --service "Share-Videos"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy_frontend:
    name: Deploy frontend
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'frontend'
    environment: Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: "--prod"
          vercel-org-id: ${{ secrets.ORG_ID}}
          vercel-project-id: ${{ secrets.PROJECT_ID}}
