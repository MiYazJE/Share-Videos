version: '2.2'

services:
  web:
    image: share-videos-web:local
    build:
      network: host
      context: ./client
      dockerfile: Dockerfile.dev
    stdin_open: true
    tty: true
    volumes:
      - "./client:/app"
      - "~/.npmrc:/root/.npmrc:ro"
    networks:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

  share-videos:
    image: share-videos:local
    build:
      network: host
      context: ./server
      dockerfile: Dockerfile.dev
    stdin_open: true
    tty: true
    volumes:
      - "./server:/app"
      - "~/.npmrc:/root/.npmrc:ro"
    networks:
      - backend
    ports:
      - "5000:3000"
    restart: unless-stopped

  mongo:
    image: mongo:8.0
    volumes:
      - "mongo_data:/data/db"
      - "mongo_configsvr:/data/configdb"
    networks:
      - backend
    ports:
      - "27018:27017"
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_configsvr:


networks:
  backend:
    driver: bridge
